name: vibebuild_app
description: 开造 VCC — AI项目撮合平台
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <5.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.6.1

  # 路由
  go_router: ^14.8.1

  # 网络
  dio: ^5.7.0

  # 本地存储
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.4

  # UI组件
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17

  # 国际化
  intl: any

  # 工具
  uuid: ^4.5.1
  equatable: ^2.0.7
  json_annotation: ^4.9.0
  connectivity_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
