<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>技能星系 Mockup</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#1a1a1a; font-family:-apple-system,'SF Pro Display','Inter',sans-serif; display:flex; justify-content:center; padding:24px 16px; min-height:100vh; }

  .phone {
    width:390px; max-width:100%; background:#F9F9F9; border-radius:40px;
    box-shadow:0 24px 80px rgba(0,0,0,0.3);
    overflow:hidden;
  }
  .phone-inner {
    height:844px; overflow-y:auto; -webkit-overflow-scrolling:touch;
  }
  .phone-inner::-webkit-scrollbar { display:none; }

  /* ── Hero Constellation ── */
  .hero {
    background:linear-gradient(180deg, #050508 0%, #0E0E14 40%, #151520 100%);
    padding:54px 0 0;
    position:relative;
    overflow:hidden;
  }

  /* Subtle star dust background */
  .hero::before {
    content:'';
    position:absolute; inset:0;
    background:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.15), transparent),
      radial-gradient(1px 1px at 60% 20%, rgba(255,255,255,0.1), transparent),
      radial-gradient(1px 1px at 80% 60%, rgba(255,255,255,0.12), transparent),
      radial-gradient(1px 1px at 40% 70%, rgba(255,255,255,0.08), transparent),
      radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,0.1), transparent),
      radial-gradient(1px 1px at 90% 40%, rgba(255,255,255,0.06), transparent),
      radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.14), transparent),
      radial-gradient(1px 1px at 70% 85%, rgba(255,255,255,0.09), transparent),
      radial-gradient(1px 1px at 30% 50%, rgba(255,255,255,0.07), transparent),
      radial-gradient(1.5px 1.5px at 15% 45%, rgba(255,255,255,0.18), transparent),
      radial-gradient(1.5px 1.5px at 85% 25%, rgba(255,255,255,0.13), transparent);
    pointer-events:none;
  }

  .hero-nav {
    padding:0 20px 16px;
    position:relative; z-index:10;
  }
  .back-btn {
    width:32px; height:32px; display:flex; align-items:center; justify-content:center;
    color:rgba(255,255,255,0.5); font-size:18px; cursor:pointer;
  }

  /* ── Constellation Canvas ── */
  .constellation {
    position:relative;
    width:100%; height:280px;
    z-index:5;
  }

  /* Connection lines (SVG) */
  .constellation svg {
    position:absolute; inset:0; width:100%; height:100%;
    pointer-events:none;
  }
  .conn-line {
    stroke:rgba(255,255,255,0.08);
    stroke-width:1;
    stroke-dasharray:4 4;
  }
  .conn-line.shared {
    stroke:rgba(124,58,237,0.25);
    stroke-width:1.5;
    stroke-dasharray:none;
  }

  /* Member nodes */
  .node {
    position:absolute;
    display:flex; flex-direction:column; align-items:center; gap:6px;
    cursor:pointer;
    transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .node:hover { transform:scale(1.08); }
  .node.leader { z-index:10; }

  .node-avatar {
    border-radius:50%; border:2px solid rgba(255,255,255,0.15);
    box-shadow:0 0 20px rgba(255,255,255,0.06);
    position:relative;
  }
  .node.leader .node-avatar {
    border-color:rgba(124,58,237,0.4);
    box-shadow:0 0 30px rgba(124,58,237,0.15), 0 0 60px rgba(124,58,237,0.05);
  }

  .node-avatar img {
    display:block; border-radius:50%; object-fit:cover;
  }

  .node-name {
    font-size:11px; font-weight:600; color:rgba(255,255,255,0.7);
    text-align:center; white-space:nowrap;
  }
  .node.leader .node-name {
    color:rgba(255,255,255,0.9); font-size:12px;
  }

  /* Skill orbitals around nodes */
  .skill-orbit {
    position:absolute;
    padding:3px 8px; border-radius:999px;
    font-size:9px; font-weight:600;
    white-space:nowrap;
    pointer-events:none;
    opacity:0.7;
  }
  .skill-orbit.purple { background:rgba(124,58,237,0.2); color:rgba(200,170,255,0.9); }
  .skill-orbit.gray { background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.5); }
  .skill-orbit.teal { background:rgba(6,182,212,0.15); color:rgba(150,230,245,0.9); }
  .skill-orbit.gold { background:rgba(245,158,11,0.15); color:rgba(255,210,130,0.9); }

  /* ── Team Info Overlay ── */
  .team-info {
    position:relative; z-index:10;
    padding:0 24px 32px;
  }
  .team-name {
    font-size:26px; font-weight:700; color:#fff;
    letter-spacing:-0.8px; line-height:1.15;
  }
  .team-tagline {
    font-size:14px; color:rgba(255,255,255,0.45);
    margin-top:8px; line-height:1.5;
  }
  .team-badges {
    display:flex; gap:8px; margin-top:14px; flex-wrap:wrap;
  }
  .badge {
    padding:4px 10px; border-radius:6px;
    font-size:11px; font-weight:500;
    background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.5);
  }
  .badge.bright {
    background:rgba(124,58,237,0.15); color:rgba(200,170,255,0.9);
    font-weight:600;
  }
  .team-rate {
    font-size:28px; font-weight:700; color:#fff;
    letter-spacing:-0.5px; margin-top:16px;
  }

  /* ── Below Hero (content cards) ── */
  .content { padding:28px 20px 40px; }
  .stat-row { display:flex; gap:10px; }
  .stat-card {
    flex:1; background:#fff; border-radius:12px;
    padding:18px 12px; text-align:center;
  }
  .stat-icon { font-size:18px; color:#1A1C1C; }
  .stat-val { font-size:18px; font-weight:700; color:#1A1C1C; margin-top:8px; }
  .stat-label { font-size:11px; color:#999; letter-spacing:0.5px; margin-top:4px; }

  .card-block {
    background:#fff; border-radius:12px; padding:20px;
    margin-top:16px;
  }
  .card-label {
    font-size:11px; font-weight:600; color:#999;
    letter-spacing:2px; margin-bottom:14px;
  }
  .card-text { font-size:14px; line-height:1.7; color:#555; }

  .zone-tag {
    position:absolute; right:12px; top:60px;
    font-size:9px; font-weight:700; letter-spacing:.8px; text-transform:uppercase;
    color:#7C3AED; background:rgba(124,58,237,0.15); padding:3px 8px; border-radius:6px;
    z-index:20;
  }
</style>
</head>
<body>
<div class="phone">
<div class="phone-inner">

  <!-- ══ Hero: Skill Constellation ══ -->
  <div class="hero">
    <div class="zone-tag">Constellation Hero</div>
    <div class="hero-nav">
      <div class="back-btn">‹</div>
    </div>

    <div class="constellation">
      <!-- Connection lines -->
      <svg viewBox="0 0 390 280">
        <!-- Shared skill connections (Flutter) -->
        <line class="conn-line shared" x1="195" y1="100" x2="80" y2="65"/>
        <line class="conn-line shared" x1="195" y1="100" x2="310" y2="150"/>
        <!-- Structural connections -->
        <line class="conn-line" x1="195" y1="100" x2="140" y2="190"/>
        <line class="conn-line" x1="195" y1="100" x2="280" y2="60"/>
        <line class="conn-line" x1="80" y1="65" x2="140" y2="190"/>
        <line class="conn-line" x1="280" y1="60" x2="310" y2="150"/>
      </svg>

      <!-- Leader node (center) -->
      <div class="node leader" style="left:170px; top:72px;">
        <div class="node-avatar" style="width:56px;height:56px;">
          <img src="https://randomuser.me/api/portraits/men/32.jpg" width="52" height="52" style="margin:2px;"/>
        </div>
        <div class="node-name">阿杰 · 队长</div>
        <!-- Orbiting skills -->
        <div class="skill-orbit purple" style="position:absolute; left:-36px; top:-4px;">Flutter</div>
        <div class="skill-orbit gray" style="position:absolute; right:-28px; top:8px;">Dart</div>
      </div>

      <!-- Member 2 (upper-left) -->
      <div class="node" style="left:56px; top:38px;">
        <div class="node-avatar" style="width:44px;height:44px;">
          <img src="https://randomuser.me/api/portraits/women/44.jpg" width="40" height="40" style="margin:2px;"/>
        </div>
        <div class="node-name">小雨</div>
        <div class="skill-orbit purple" style="position:absolute; left:-30px; top:0;">Flutter</div>
        <div class="skill-orbit teal" style="position:absolute; left:-14px; top:50px;">Firebase</div>
      </div>

      <!-- Member 3 (upper-right) -->
      <div class="node" style="left:258px; top:32px;">
        <div class="node-avatar" style="width:44px;height:44px;">
          <img src="https://randomuser.me/api/portraits/men/75.jpg" width="40" height="40" style="margin:2px;"/>
        </div>
        <div class="node-name">王磊</div>
        <div class="skill-orbit gray" style="position:absolute; right:-20px; top:2px;">Dart</div>
        <div class="skill-orbit gold" style="position:absolute; right:-26px; top:48px;">设计</div>
      </div>

      <!-- Member 4 (lower-left) -->
      <div class="node" style="left:114px; top:162px;">
        <div class="node-avatar" style="width:44px;height:44px;">
          <img src="https://randomuser.me/api/portraits/men/22.jpg" width="40" height="40" style="margin:2px;"/>
        </div>
        <div class="node-name">赵强</div>
        <div class="skill-orbit teal" style="position:absolute; left:-34px; top:4px;">Firebase</div>
        <div class="skill-orbit gray" style="position:absolute; left:8px; top:54px;">测试</div>
      </div>

      <!-- Member 5 (lower-right) -->
      <div class="node" style="left:286px; top:122px;">
        <div class="node-avatar" style="width:40px;height:40px;">
          <img src="https://randomuser.me/api/portraits/women/68.jpg" width="36" height="36" style="margin:2px;"/>
        </div>
        <div class="node-name">小梦</div>
        <div class="skill-orbit purple" style="position:absolute; right:-28px; top:0;">Flutter</div>
        <div class="skill-orbit gold" style="position:absolute; right:-12px; top:44px;">UI</div>
      </div>
    </div>

    <!-- Team info below constellation -->
    <div class="team-info">
      <div class="team-name">极速移动工作室</div>
      <div class="team-tagline">从需求到上架，移动端全链路交付</div>
      <div class="team-badges">
        <span class="badge bright">活跃</span>
        <span class="badge">5人团队</span>
        <span class="badge">接单中</span>
      </div>
      <div class="team-rate">¥300/h</div>
    </div>
  </div>

  <!-- ══ Content Cards ══ -->
  <div class="content">
    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-icon">🛡</div>
        <div class="stat-val">活跃</div>
        <div class="stat-label">等级</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📁</div>
        <div class="stat-val">23</div>
        <div class="stat-label">历史项目</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📈</div>
        <div class="stat-val">3年</div>
        <div class="stat-label">经验</div>
      </div>
    </div>

    <div class="card-block">
      <div class="card-label">团队介绍</div>
      <div class="card-text">全栈移动端开发团队，专注 Flutter 生态。从需求分析、UI 设计到 App Store 上架，全链路交付。已帮助 23 个项目成功落地。</div>
    </div>

    <div class="card-block">
      <div class="card-label">详细信息</div>
      <div style="display:flex;justify-content:space-between;padding:4px 0;"><span style="color:#999;font-size:14px;">团队规模</span><span style="font-size:14px;font-weight:500;color:#1A1C1C;">5 人</span></div>
      <div style="display:flex;justify-content:space-between;padding:10px 0 4px;"><span style="color:#999;font-size:14px;">完成项目</span><span style="font-size:14px;font-weight:500;color:#1A1C1C;">23 个</span></div>
      <div style="display:flex;justify-content:space-between;padding:10px 0 4px;"><span style="color:#999;font-size:14px;">报价范围</span><span style="font-size:14px;font-weight:500;color:#1A1C1C;">¥300/h</span></div>
    </div>
  </div>

</div>
</div>
</body>
</html>
