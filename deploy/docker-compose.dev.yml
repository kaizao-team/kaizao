version: "3.9"

# 本地开发环境
# MySQL 使用本地原生安装（3306），此文件只管 Redis
# AI Agent .env: MYSQL_URL=mysql+aiomysql://root:123456@localhost:3306/kaizao?charset=utf8mb4

services:
  redis:
    image: redis:7-alpine
    container_name: vcc-redis
    restart: unless-stopped
    command: redis-server --requirepass redis123
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
