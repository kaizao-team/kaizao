# =============================================================================
# 开造 VCC - Nginx 生产级配置
# =============================================================================

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # =========================================================================
    # 日志格式
    # =========================================================================
    log_format main_json escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request_method":"$request_method",'
            '"request_uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"http_referer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"http_x_forwarded_for":"$http_x_forwarded_for",'
            '"request_id":"$request_id"'
        '}';

    access_log /var/log/nginx/access.log main_json;

    # =========================================================================
    # 基础优化
    # =========================================================================
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens   off;

    # 客户端限制
    client_max_body_size 50m;
    client_body_timeout 60s;
    client_header_timeout 30s;
    send_timeout 60s;

    # 缓冲区
    client_body_buffer_size 16k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;

    # =========================================================================
    # Gzip 压缩
    # =========================================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;

    # =========================================================================
    # 限流配置
    # =========================================================================
    # 全局限流区域: 每个IP 30 req/s
    limit_req_zone $binary_remote_addr zone=global_limit:10m rate=30r/s;
    # API限流区域: 每个IP 20 req/s
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
    # 登录限流: 每个IP 5 req/min
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
    # AI接口限流: 每个IP 10 req/min
    limit_req_zone $binary_remote_addr zone=ai_limit:10m rate=10r/m;
    # 文件上传限流: 每个IP 5 req/min
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/m;
    # 连接数限制
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # =========================================================================
    # 上游服务
    # =========================================================================
    upstream go_server {
        server server:8080;
        keepalive 32;
    }

    upstream ai_agent {
        server ai-agent:8000;
        keepalive 16;
    }

    # =========================================================================
    # CORS headers map
    # =========================================================================
    map $http_origin $cors_origin {
        default "";
        "~^https?://localhost(:[0-9]+)?$" $http_origin;
        "~^https?://.*\.vibebuild\.com$" $http_origin;
        "~^https?://vibebuild\.com$" $http_origin;
    }

    # =========================================================================
    # HTTP -> HTTPS 重定向 (生产环境启用)
    # =========================================================================
    # server {
    #     listen 80;
    #     server_name vibebuild.com *.vibebuild.com;
    #     return 301 https://$host$request_uri;
    # }

    # =========================================================================
    # 主服务器
    # =========================================================================
    server {
        listen 80;
        server_name _;

        # HTTPS 配置 (取消注释启用)
        # listen 443 ssl http2;
        # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        # ssl_protocols TLSv1.2 TLSv1.3;
        # ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        # ssl_prefer_server_ciphers on;
        # ssl_session_cache shared:SSL:10m;
        # ssl_session_timeout 1d;
        # ssl_session_tickets off;

        # =====================================================================
        # 安全头
        # =====================================================================
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        # HSTS (HTTPS启用后取消注释)
        # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # =====================================================================
        # 健康检查端点 (不限流,不记日志)
        # =====================================================================
        location = /health {
            access_log off;
            return 200 '{"status":"ok","service":"nginx"}';
            add_header Content-Type application/json;
        }

        # =====================================================================
        # API 代理 -> Go后端 (server:8080)
        # =====================================================================
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn conn_limit 20;

            # CORS
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID, X-Device-Type, X-App-Version" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 86400 always;

            if ($request_method = 'OPTIONS') {
                return 204;
            }

            proxy_pass http://go_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";

            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 16k;
        }

        # 登录/注册接口额外限流
        location ~ ^/api/v1/auth/(login|register|sms) {
            limit_req zone=auth_limit burst=3 nodelay;

            proxy_pass http://go_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";
        }

        # 文件上传接口限流
        location ~ ^/api/v1/(demands|messages|portfolios)/.*/upload {
            limit_req zone=upload_limit burst=3 nodelay;
            client_max_body_size 50m;

            proxy_pass http://go_server;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";
            proxy_request_buffering off;
        }

        # =====================================================================
        # AI Agent 代理 -> Python服务 (ai-agent:8000)
        # =====================================================================
        location /ai/ {
            limit_req zone=ai_limit burst=5 nodelay;
            limit_conn conn_limit 10;

            # CORS
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
            add_header Access-Control-Allow-Credentials "true" always;

            if ($request_method = 'OPTIONS') {
                return 204;
            }

            proxy_pass http://ai_agent;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";

            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # =====================================================================
        # WebSocket 代理 -> Go后端 (server:8080)
        # =====================================================================
        location /ws/ {
            limit_conn conn_limit 5;

            proxy_pass http://go_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_connect_timeout 10s;
            proxy_send_timeout 3600s;
            proxy_read_timeout 3600s;

            # WebSocket ping/pong keepalive
            proxy_buffering off;
        }

        # =====================================================================
        # 静态文件 (Flutter Web / H5预览)
        # =====================================================================
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            # 静态资源缓存策略
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 30d;
                add_header Cache-Control "public, no-transform";
                access_log off;
            }

            # HTML不缓存 (SPA路由)
            location ~* \.html$ {
                expires -1;
                add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
            }
        }

        # =====================================================================
        # 禁止访问隐藏文件
        # =====================================================================
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # =====================================================================
        # 限流错误页面
        # =====================================================================
        error_page 429 /429.json;
        location = /429.json {
            internal;
            return 429 '{"code":429,"message":"请求过于频繁，请稍后重试","data":{"retry_after":30}}';
            add_header Content-Type application/json always;
            add_header Retry-After 30 always;
        }

        # 自定义错误页面
        error_page 502 503 504 /50x.json;
        location = /50x.json {
            internal;
            return 502 '{"code":502,"message":"服务暂时不可用，请稍后重试","data":null}';
            add_header Content-Type application/json always;
        }
    }
}
