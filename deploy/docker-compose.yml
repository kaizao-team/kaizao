version: "3.9"

# =============================================================================
# 开造 VCC - Docker Compose 生产级编排
# 一键启动命令: docker-compose up -d
# =============================================================================

x-common-env: &common-env
  TZ: Asia/Shanghai

services:

  # ===========================================================================
  # PostgreSQL 16 - 核心业务数据库
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: vcc-postgres
    restart: unless-stopped
    environment:
      <<: *common-env
      POSTGRES_DB: ${POSTGRES_DB:-vibebuild}
      POSTGRES_USER: ${POSTGRES_USER:-vibebuild}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vibebuild} -d ${POSTGRES_DB:-vibebuild}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - vcc-network
    deploy:
      resources:
        limits:
          memory: 1G

  # ===========================================================================
  # Redis 7 - 缓存/会话/消息队列
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: vcc-redis
    restart: unless-stopped
    environment:
      <<: *common-env
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 60 1000
      --save 300 100
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - vcc-network
    deploy:
      resources:
        limits:
          memory: 768M

  # ===========================================================================
  # Milvus 依赖 - etcd (元数据存储)
  # ===========================================================================
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.11
    container_name: vcc-milvus-etcd
    restart: unless-stopped
    environment:
      <<: *common-env
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: >
      etcd
      --advertise-client-urls=http://127.0.0.1:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
      --initial-advertise-peer-urls=http://127.0.0.1:2380
      --listen-peer-urls=http://0.0.0.0:2380
      --initial-cluster=default=http://127.0.0.1:2380
      --name=default
    volumes:
      - milvus_etcd_data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 30s
    networks:
      - vcc-network
    deploy:
      resources:
        limits:
          memory: 512M

  # ===========================================================================
  # Milvus 依赖 - MinIO (对象存储)
  # ===========================================================================
  milvus-minio:
    image: minio/minio:RELEASE.2024-01-01T16-36-33Z
    container_name: vcc-milvus-minio
    restart: unless-stopped
    environment:
      <<: *common-env
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - milvus_minio_data:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 30s
    networks:
      - vcc-network
    deploy:
      resources:
        limits:
          memory: 512M

  # ===========================================================================
  # Milvus 2.3 - 向量数据库 (AI RAG知识库)
  # ===========================================================================
  milvus:
    image: milvusdb/milvus:v2.3.7
    container_name: vcc-milvus
    restart: unless-stopped
    environment:
      <<: *common-env
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
      MINIO_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: ["milvus", "run", "standalone"]
    ports:
      - "${MILVUS_PORT:-19530}:19530"
      - "${MILVUS_GRPC_PORT:-9091}:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      milvus-etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 90s
    networks:
      - vcc-network
    deploy:
      resources:
        limits:
          memory: 2G

  # ===========================================================================
  # Elasticsearch 8.x - 全文搜索/BM25检索
  # ===========================================================================
  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: vcc-elasticsearch
    restart: unless-stopped
    environment:
      <<: *common-env
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      cluster.name: vcc-es-cluster
      node.name: vcc-es-node1
    ports:
      - "${ES_PORT:-9200}:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - vcc-network
    deploy:
      resources:
        limits:
          memory: 1G

  # ===========================================================================
  # Go 后端服务 (server)
  # ===========================================================================
  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    image: vibebuild/server:${APP_VERSION:-latest}
    container_name: vcc-server
    restart: unless-stopped
    environment:
      <<: *common-env
      APP_ENV: ${APP_ENV:-production}
      APP_PORT: "8080"
      # viper 环境变量覆盖（前缀必须是 VB_）
      VB_SERVER_PORT: "8080"
      # PostgreSQL
      VB_DATABASE_HOST: postgres
      VB_DATABASE_PORT: "5432"
      VB_DATABASE_DBNAME: ${POSTGRES_DB:-vibebuild}
      VB_DATABASE_USER: ${POSTGRES_USER:-vibebuild}
      VB_DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      VB_DATABASE_SSLMODE: disable
      VB_DATABASE_MAX_OPEN_CONNS: "50"
      VB_DATABASE_MAX_IDLE_CONNS: "10"
      # Redis
      VB_REDIS_HOST: redis
      VB_REDIS_PORT: "6379"
      VB_REDIS_PASSWORD: ${REDIS_PASSWORD}
      VB_REDIS_DB: "0"
      # JWT
      VB_JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-7200}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-2592000}
      # 外部服务
      AI_AGENT_URL: http://ai-agent:8000
      WECHAT_APP_ID: ${WECHAT_APP_ID:-}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:-}
      WECHAT_MCH_ID: ${WECHAT_MCH_ID:-}
      ALIPAY_APP_ID: ${ALIPAY_APP_ID:-}
      OSS_ENDPOINT: ${OSS_ENDPOINT:-}
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:-}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET:-}
      OSS_BUCKET: ${OSS_BUCKET:-vibebuild}
      SMS_ACCESS_KEY_ID: ${SMS_ACCESS_KEY_ID:-}
      SMS_ACCESS_KEY_SECRET: ${SMS_ACCESS_KEY_SECRET:-}
      SMS_SIGN_NAME: ${SMS_SIGN_NAME:-开造}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - vcc-network
    deploy:
      resources:
        limits:
          memory: 512M

  # ===========================================================================
  # Python AI Agent 服务
  # ===========================================================================
  ai-agent:
    build:
      context: ../ai-agent
      dockerfile: Dockerfile
    image: vibebuild/ai-agent:${APP_VERSION:-latest}
    container_name: vcc-ai-agent
    restart: unless-stopped
    environment:
      <<: *common-env
      APP_ENV: ${APP_ENV:-production}
      APP_PORT: "8000"
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # Milvus
      MILVUS_HOST: milvus
      MILVUS_PORT: "19530"
      # Elasticsearch
      ES_HOST: http://elasticsearch:9200
      # PostgreSQL (只读连接)
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB:-vibebuild}
      DB_USER: ${POSTGRES_USER:-vibebuild}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      # LLM API Keys
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      # Embedding
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-bge-m3}
      # 限流
      AI_RATE_LIMIT_FREE: ${AI_RATE_LIMIT_FREE:-10}
      AI_RATE_LIMIT_PRO: ${AI_RATE_LIMIT_PRO:-100}
    ports:
      - "${AI_AGENT_PORT:-8000}:8000"
    depends_on:
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - vcc-network
    deploy:
      resources:
        limits:
          memory: 1G

  # ===========================================================================
  # Nginx 反向代理 / 静态文件 / 路由分发
  # ===========================================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: vcc-nginx
    restart: unless-stopped
    environment:
      <<: *common-env
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
      - static_files:/usr/share/nginx/html:ro
      # 如需HTTPS，取消下方注释并挂载证书
      # - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      server:
        condition: service_healthy
      ai-agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - vcc-network
    deploy:
      resources:
        limits:
          memory: 256M

# =============================================================================
# 持久化卷
# =============================================================================
volumes:
  postgres_data:
    name: vcc-postgres-data
  redis_data:
    name: vcc-redis-data
  milvus_etcd_data:
    name: vcc-milvus-etcd-data
  milvus_minio_data:
    name: vcc-milvus-minio-data
  milvus_data:
    name: vcc-milvus-data
  es_data:
    name: vcc-es-data
  nginx_logs:
    name: vcc-nginx-logs
  static_files:
    name: vcc-static-files

# =============================================================================
# 网络
# =============================================================================
networks:
  vcc-network:
    name: vcc-network
    driver: bridge
