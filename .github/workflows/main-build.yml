name: Main Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: main-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter-build-web:
    name: Flutter Web Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Build web
        working-directory: app
        run: flutter build web --release

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-web-build
          path: app/build/web

  server-docker-build:
    name: Server Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build server image
        run: docker build -f server/Dockerfile -t kaizao/server:${{ github.sha }} server

  ai-agent-docker-build:
    name: AI Agent Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build AI agent image
        run: docker build -f ai-agent/Dockerfile -t kaizao/ai-agent:${{ github.sha }} ai-agent
