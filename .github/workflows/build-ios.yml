name: Build iOS

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/build-ios.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/build-ios.yml"
  workflow_dispatch:
    inputs:
      build_mode:
        description: "构建模式"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - debug
      export_method:
        description: "导出方式"
        required: true
        default: "ad-hoc"
        type: choice
        options:
          - ad-hoc
          - app-store
          - development

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.41.5"

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v
        working-directory: app

      - name: Get dependencies
        run: flutter pub get
        working-directory: app

      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        working-directory: app

      - name: Install CocoaPods dependencies
        run: pod install --repo-update
        working-directory: app/ios

      - name: Install Apple certificate and provisioning profile
        if: github.event_name != 'pull_request'
        env:
          P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$P12_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build iOS (Release - no codesign for PR)
        if: github.event_name == 'pull_request'
        run: flutter build ios --release --no-codesign
        working-directory: app

      - name: Build iOS (Release)
        if: github.event_name != 'pull_request' && github.event.inputs.build_mode != 'debug'
        run: flutter build ios --release
        working-directory: app

      - name: Build iOS (Debug)
        if: github.event.inputs.build_mode == 'debug'
        run: flutter build ios --debug --no-codesign
        working-directory: app

      - name: Create ExportOptions.plist
        if: github.event_name != 'pull_request' && github.event.inputs.build_mode != 'debug'
        env:
          EXPORT_METHOD: ${{ github.event.inputs.export_method || 'ad-hoc' }}
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          PROVISION_PROFILE_NAME: ${{ secrets.IOS_PROVISION_PROFILE_NAME }}
        run: |
          cat > ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${EXPORT_METHOD}</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>cc.kaizao</key>
              <string>${PROVISION_PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          PLIST

      - name: Export IPA
        if: github.event_name != 'pull_request' && github.event.inputs.build_mode != 'debug'
        run: |
          xcodebuild -exportArchive \
            -archivePath app/build/ios/archive/Runner.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath app/build/ios/ipa \
            -allowProvisioningUpdates

      - name: Upload IPA artifact
        if: github.event_name != 'pull_request' && github.event.inputs.build_mode != 'debug'
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ github.sha }}
          path: app/build/ios/ipa/*.ipa
          retention-days: 14
          if-no-files-found: warn

      - name: Upload iOS build (no-codesign)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-${{ github.sha }}
          path: app/build/ios/iphoneos/Runner.app
          retention-days: 7
          if-no-files-found: warn

      - name: Clean up keychain
        if: always() && github.event_name != 'pull_request'
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true

      - name: Build summary
        if: always()
        run: |
          echo "## iOS Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Flutter | ${{ env.FLUTTER_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mode | ${{ github.event.inputs.build_mode || 'release' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Export | ${{ github.event.inputs.export_method || 'ad-hoc' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Ref | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          if [ -d "app/build/ios/ipa" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### IPA Files" >> $GITHUB_STEP_SUMMARY
            ls -lh app/build/ios/ipa/*.ipa 2>/dev/null | awk '{print "- `" $NF "` — " $5}' >> $GITHUB_STEP_SUMMARY || echo "- No IPA found" >> $GITHUB_STEP_SUMMARY
          fi
