name: PR Guard

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  merge_group:
    types:
      - checks_requested
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-guard-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  flutter-checks:
    name: Flutter Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Analyze
        working-directory: app
        run: flutter analyze

      - name: Test
        working-directory: app
        run: flutter test

  go-checks:
    name: Go Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Test
        working-directory: server
        run: go test ./...

      - name: Build
        working-directory: server
        run: go build ./...

  python-checks:
    name: AI Agent Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ai-agent/requirements.txt

      - name: Install dependencies
        working-directory: ai-agent
        run: python -m pip install -r requirements.txt

      - name: Test
        working-directory: ai-agent
        run: pytest

  ai-review:
    name: OpenAI GPT-5.4 xhigh Review
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    env:
      OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || 'https://api-vip.codex-for.me/v1' }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4' }}
      OPENAI_REASONING_EFFORT: ${{ vars.OPENAI_REASONING_EFFORT || 'xhigh' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      AI_REVIEW_PROMPT_FILE: .github/prompts/pr_review.md
      AI_REVIEW_DIFF_FILE: .github/tmp/pr.diff
      AI_REVIEW_FILES_FILE: .github/tmp/pr.files
      AI_REVIEW_RESULT_FILE: .github/tmp/pr-review-result.json
      AI_REVIEW_MAX_DIFF_CHARS: "120000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build PR diff
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          mkdir -p .github/tmp
          git fetch --no-tags --prune --depth=1 origin "${BASE_REF}"
          git diff --no-color --unified=3 "origin/${BASE_REF}...HEAD" > "${AI_REVIEW_DIFF_FILE}"
          git diff --name-status "origin/${BASE_REF}...HEAD" > "${AI_REVIEW_FILES_FILE}"

      - name: Run AI review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python .github/scripts/pr_ai_review.py
