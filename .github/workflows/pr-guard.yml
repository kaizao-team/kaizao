name: PR Guard

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  merge_group:
    types:
      - checks_requested
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-guard-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  flutter-checks:
    name: Flutter Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Analyze
        working-directory: app
        run: flutter analyze

      - name: Test
        working-directory: app
        run: flutter test

  go-checks:
    name: Go Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Test
        working-directory: server
        run: go test ./...

      - name: Build
        working-directory: server
        run: go build ./...

  python-checks:
    name: AI Agent Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ai-agent/requirements.txt

      - name: Install dependencies
        working-directory: ai-agent
        run: python -m pip install -r requirements.txt

      - name: Test
        working-directory: ai-agent
        run: pytest
