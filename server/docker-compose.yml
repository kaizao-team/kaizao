services:
  mysql:
    image: mysql:8.0
    container_name: kaizao-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: kaizao123
      MYSQL_DATABASE: kaizao
      MYSQL_USER: kaizao
      MYSQL_PASSWORD: kaizao123
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./migrations/001_init_schema.up.sql:/docker-entrypoint-initdb.d/001_init_schema.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max-connections=200
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pkaizao123"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 120s

  redis:
    image: redis:7-alpine
    container_name: kaizao-redis
    restart: unless-stopped
    command: redis-server --requirepass redis123
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kaizao-server
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      VB_SERVER_MODE: debug
      VB_DATABASE_HOST: mysql
      VB_DATABASE_PORT: "3306"
      VB_DATABASE_USER: kaizao
      VB_DATABASE_PASSWORD: kaizao123
      VB_DATABASE_DBNAME: kaizao
      VB_DATABASE_CHARSET: utf8mb4
      VB_DATABASE_PARSE_TIME: "true"
      VB_DATABASE_LOC: Local
      VB_REDIS_HOST: redis
      VB_REDIS_PORT: "6379"
      VB_REDIS_PASSWORD: redis123
      VB_JWT_SECRET: kaizao-dev-jwt-secret
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  mysql_data:
  redis_data:
