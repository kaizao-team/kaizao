services:
  mysql:
    image: mysql:8.0
    container_name: kaizao-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: kaizao123
      MYSQL_DATABASE: kaizao
      MYSQL_USER: kaizao
      MYSQL_PASSWORD: kaizao123
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./migrations/001_init_schema.up.sql:/docker-entrypoint-initdb.d/001_init_schema.sql:ro
      - ./migrations/002_invite_onboarding.up.sql:/docker-entrypoint-initdb.d/002_invite_onboarding.sql:ro
      - ./migrations/003_team_invite_onboarding.up.sql:/docker-entrypoint-initdb.d/003_team_invite_onboarding.sql:ro
      - ./migrations/004_team_static_assets.up.sql:/docker-entrypoint-initdb.d/004_team_static_assets.sql:ro
      - ./migrations/005_project_category_normalize.up.sql:/docker-entrypoint-initdb.d/005_project_category_normalize.sql:ro
      - ./migrations/006_user_contact_phone.up.sql:/docker-entrypoint-initdb.d/006_user_contact_phone.sql:ro
      - ./migrations/007_table_column_comments.up.sql:/docker-entrypoint-initdb.d/007_table_column_comments.sql:ro
      - ./migrations/008_users_username.up.sql:/docker-entrypoint-initdb.d/008_users_username.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max-connections=200
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pkaizao_prod_2026"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 120s

  redis:
    image: redis:7-alpine
    container_name: kaizao-redis
    restart: unless-stopped
    command: redis-server --requirepass redis123
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    container_name: kaizao-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kaizao-server
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      VB_SERVER_MODE: debug
      VB_DATABASE_HOST: mysql
      VB_DATABASE_PORT: "3306"
      VB_DATABASE_USER: kaizao
      VB_DATABASE_PASSWORD: kaizao123
      VB_DATABASE_DBNAME: kaizao
      VB_DATABASE_CHARSET: utf8mb4
      VB_DATABASE_PARSE_TIME: "true"
      VB_DATABASE_LOC: Local
      VB_REDIS_HOST: redis
      VB_REDIS_PORT: "6379"
      VB_REDIS_PASSWORD: redis123
      VB_JWT_SECRET: kaizao-dev-jwt-secret
      VB_OSS_ENABLED: "true"
      VB_OSS_ENDPOINT: minio:9000
      VB_OSS_USE_SSL: "false"
      VB_OSS_ACCESS_KEY_ID: minio
      VB_OSS_ACCESS_KEY_SECRET: minio12345
      VB_OSS_BUCKET_NAME: kaizao
      VB_OSS_BASE_URL: http://localhost:9000/kaizao
      # 智能匹配：POST /api/v2/match/recommend（无尾斜杠）
      VB_AI_AGENT_BASE_URL: http://47.236.165.75:39528
      # 无 configs/auth_password_rsa.pem 时 debug 下自动生成 RSA 密钥（重启后公钥会变）
      VB_AUTH_PASSWORD_DEV_AUTO_KEY: "1"
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  mysql_data:
  redis_data:
  minio_data:
