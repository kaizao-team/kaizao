# 开造 VibeBuild 配置文件
# 所有配置均可通过环境变量覆盖，前缀 VB_
# 例如 VB_SERVER_PORT=8080 覆盖 server.port

server:
  port: 8080
  mode: debug  # debug / release / test
  read_timeout_sec: 10
  write_timeout_sec: 10
  # 对外 API 根 URL（无尾斜杠）；配置后 POST /upload 可将相对资源路径拼成绝对 URL（勿用请求 Host，防主机头注入）
  public_base_url: ""

database:
  host: localhost
  port: 3306
  user: root
  password: "123456"
  dbname: kaizao
  charset: utf8mb4
  parse_time: true
  loc: Local
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime_min: 30

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0

jwt:
  secret: kaizao-jwt-secret-change-in-prod
  access_expire_hour: 2
  refresh_expire_day: 30
  issuer: kaizao

log:
  level: info   # debug / info / warn / error
  format: json  # json / console

# 对象存储：MinIO / 阿里云 OSS（S3 兼容）；团队静态文件、POST /upload 等
# enabled=false 且未配置 local_upload_dir 时，通用上传返回 11013
oss:
  enabled: false
  endpoint: localhost:9000
  use_ssl: false
  region: ""
  access_key_id: ""
  access_key_secret: ""
  bucket_name: kaizao
  base_url: http://localhost:9000/kaizao
  max_upload_mb: 32
  # 开发兜底：对象存储未启用时将文件落盘，并通过 local_url_path 静态访问
  local_upload_dir: ""
  local_url_path: /api/v1/upload-files

sms:
  access_key_id: ""
  access_key_secret: ""
  sign_name: 开造
  template_code: SMS_123456

# 注册策略：空列表表示不限制（与历史行为一致）
# 示例：专家 role=2、3 需邀请码且审核通过后才能登录
registration:
  disable_auto_register: false
  require_invite_roles: []
  require_approval_roles: []
