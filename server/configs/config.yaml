# 开造 VibeBuild 配置文件
# 所有配置均可通过环境变量覆盖，前缀 VB_
# 例如 VB_SERVER_PORT=8080 覆盖 server.port

server:
  port: 8080
  mode: debug  # debug / release / test
  read_timeout_sec: 10
  write_timeout_sec: 10

database:
  host: localhost
  port: 5432
  user: vibebuild
  password: vibebuild123
  dbname: vibebuild
  sslmode: disable
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime_min: 30

redis:
  host: localhost
  port: 6379
  password: "redis123"
  db: 0

jwt:
  secret: vibebuild-jwt-secret-change-in-prod
  access_expire_hour: 2
  refresh_expire_day: 30
  issuer: vibebuild

log:
  level: info   # debug / info / warn / error
  format: json  # json / console

oss:
  endpoint: oss-cn-shenzhen.aliyuncs.com
  access_key_id: ""
  access_key_secret: ""
  bucket_name: vibebuild-assets
  base_url: https://vibebuild-assets.oss-cn-shenzhen.aliyuncs.com

sms:
  access_key_id: ""
  access_key_secret: ""
  sign_name: 开造
  template_code: SMS_123456
